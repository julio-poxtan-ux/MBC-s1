<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crear cuenta - Maktub</title>
  <meta name="description" content="Registro de cuenta Maktub con validaciones completas, accesible y responsive." />
  <meta name="keywords" content="Maktub, crear cuenta, registro, validación, onboarding, crypto" />
  <meta name="author" content="Maktub Frontend Team" />
  <meta property="og:title" content="Crear cuenta - Maktub" />
  <meta property="og:description"
    content="Formulario de registro Maktub implementado desde Figma con UX y validaciones." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="es_MX" />
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body class="mk-body">
  <a class="mk-skip-link" href="#mk-create-main">Saltar al formulario de registro</a>
  <div class="mk-app-shell">
    <img class="mk-bg-spheres" src="./assets/img/esferas.png" alt="" aria-hidden="true" />

    <header class="mk-header container-fluid px-3 px-md-4">
      <div class="d-flex justify-content-center align-items-center">
        <a href="./index_1.html" aria-label="Volver al inicio">
          <img src="./assets/img/mk-logo.svg" alt="Maktub" class="mk-brand-logo" width="80" height="92" />
        </a>
      </div>
    </header>

    <main id="mk-create-main"
      class="mk-main container-fluid d-flex justify-content-center align-items-start px-3 px-md-4">
      <section class="mk-register-card w-100" aria-labelledby="mk-register-title">
        <form id="mk-create-account-form" class="mk-register-form" novalidate data-mk-register-form>
          <header class="mk-register-header text-center">
            <h1 id="mk-register-title" class="mk-title">Crea tu cuenta</h1>
            <p class="mk-register-subtitle">ID: de patrocinador: 0000</p>
          </header>

          <div class="row g-4 w-100">
            <div class="col-12 col-md-6">
              <div class="mk-input-field p-0">
                <label for="mk-first-name" class="mk-input-label">Nombre</label>
                <div class="mk-input-control">
                  <input id="mk-first-name" name="firstName" class="mk-input-element" type="text"
                    placeholder="Nombre completo" autocomplete="given-name" aria-describedby="mk-first-name-error" />
                </div>
                <p id="mk-first-name-error" class="mk-inline-error visually-hidden" role="alert"></p>
              </div>
            </div>

            <div class="col-12 col-md-6">
              <div class="mk-input-field p-0">
                <label for="mk-last-name" class="mk-input-label">Apellido</label>
                <div class="mk-input-control">
                  <input id="mk-last-name" name="lastName" class="mk-input-element" type="text" placeholder="Apellido"
                    autocomplete="family-name" aria-describedby="mk-last-name-error" />
                </div>
                <p id="mk-last-name-error" class="mk-inline-error visually-hidden" role="alert"></p>
              </div>
            </div>
          </div>

          <div class="mk-input-field w-100">
            <label for="mk-email" class="mk-input-label">Correo electrónico</label>
            <div class="mk-input-control">
              <input id="mk-email" name="email" class="mk-input-element" type="email"
                placeholder="Ingresa tu correo electrónico" autocomplete="email" inputmode="email"
                aria-describedby="mk-email-error" />
            </div>
            <p id="mk-email-error" class="mk-inline-error visually-hidden" role="alert"></p>
          </div>

          <div class="mk-input-field w-100">
            <label for="mk-password" class="mk-input-label">Contraseña</label>
            <div class="mk-input-control">
              <input id="mk-password" name="password" class="mk-input-element" type="password" placeholder="Contraseña"
                autocomplete="new-password" aria-describedby="mk-password-error mk-password-strength-copy" />
              <button class="mk-input-icon-btn" type="button" aria-label="Mostrar contraseña"
                aria-controls="mk-password" data-mk-toggle-password>
                <i class="bi bi-eye" aria-hidden="true"></i>
              </button>
            </div>
            <p id="mk-password-error" class="mk-inline-error mk-inline-error--long visually-hidden" role="alert">
              La contraseña debe tener 8+ caracteres, 1 mayúscula, 1 minúscula, 1 número y 1
              símbolo.
            </p>
          </div>

          <div class="mk-input-field w-100">
            <label for="mk-confirm-password" class="mk-input-label">Confirmar contraseña</label>
            <div class="mk-input-control">
              <input id="mk-confirm-password" name="confirmPassword" class="mk-input-element" type="password"
                placeholder="Repite la contraseña" autocomplete="new-password"
                aria-describedby="mk-confirm-password-error mk-password-strength-copy" />
              <button class="mk-input-icon-btn" type="button" aria-label="Mostrar contraseña"
                aria-controls="mk-confirm-password" data-mk-toggle-password>
                <i class="bi bi-eye-slash" aria-hidden="true"></i>
              </button>
            </div>
            <div id="mk-password-strength" class="mk-strength-wrap mk-register-strength visually-hidden"
              aria-live="polite">
              <p id="mk-password-strength-copy" class="mk-strength-label mb-0">
                Seguridad: <strong id="mk-strength-level" class="mk-strength-low">BAJA</strong>
              </p>
              <span id="mk-strength-bar" class="mk-strength-bar mk-strength-bar--low"></span>
            </div>
            <p id="mk-confirm-password-error" class="mk-inline-error mk-inline-error--long visually-hidden"
              role="alert"></p>
          </div>

          <div class="mk-register-terms-wrap">
            <div class="mk-checkbox-row mk-checkbox-row--register">

              <input id="mk-register-terms" type="checkbox" class="mk-checkbox"
                aria-describedby="mk-register-terms-error" />
                
              <label for="mk-register-terms" class="mk-register-terms-label">
                Al hacer click en “Registrarse”, he leído los
                <strong>Términos y Condiciones</strong> junto a las
                <strong>Políticas de Privacidad.</strong>
              </label>
            </div>
            <p id="mk-register-terms-error" class="mk-inline-error visually-hidden" role="alert"></p>
          </div>

          <button id="mk-register-submit" type="submit" class="mk-btn-primary mk-register-submit" disabled
            aria-disabled="true">
            Registrarme
          </button>

          <p id="mk-register-success" class="mk-inline-success text-center visually-hidden" role="status"
            aria-live="polite">
            Registro validado correctamente. Todo listo para el siguiente paso.
          </p>
        </form>
      </section>
    </main>
  </div>

  <script src="./js/main.js" defer></script>
</body>

</html>
