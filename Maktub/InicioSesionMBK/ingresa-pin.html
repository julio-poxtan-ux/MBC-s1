<!doctype html>
<html lang="es-MX">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Onboarding MBK | Confirmación de código</title>
  <meta name="description" content="Confirma tu cuenta ingresando el código de 6 dígitos enviado a tu correo." />
  <meta name="robots" content="index,follow" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Onboarding MBK | Confirmación de código" />
  <meta property="og:description" content="Confirma tu PIN para validar tu cuenta y continuar." />
  <meta property="og:locale" content="es_MX" />
  <meta name="theme-color" content="#0f2b42" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="assets/fonts/stylesheet.css" />
</head>

<body class="mk-page-shell mk-page-shell--onboarding mk-page-shell--pin">
  <a class="mk-skip-link" href="#mk-main">Saltar al contenido principal</a>

  <main id="mk-main" class="mk-main" aria-labelledby="mk-title-pin" data-mk-page="onboarding-pin">
    <section class="mk-onboarding container-fluid px-0">
      <div class="mk-onboarding__wrapper d-flex flex-column flex-lg-row align-items-center justify-content-center">
        <div class="mk-onboarding__panel">
          <form class="mk-onboarding__card mk-code-verify" data-mk-pin-form novalidate>
            <div class="mk-code-verify__content">
              <header class="mk-onboarding__intro mk-code-verify__header">
                <img src="assets/img/logo-header.svg" alt="MBK" class="logo-header_login mb-5 pb-5">
                <h1 id="mk-title-pin" class="mk-title">Confirmación de código</h1>
                <p class="mk-lead mk-code-verify__lead">
                  Ingresa el código de 6 dígitos que enviamos a tu correo, para confirmar la creación de tu cuenta.
                </p>
              </header>

              <div class="mk-code-verify__resend-link mk-focus-ring" data-mk-code-input data-length="6"
                data-name="verificationCode">
                <label class="visually-hidden" for="mkCodeDigit1">Código de verificación de 6 dígitos</label>
                <div class="mk-code-input__digits" role="group" aria-label="Código de verificación"></div>
                <input type="hidden" name="verificationCode" data-mk-code-value />
              </div>

              <p class="mk-code-verify__resend">
                <a href="#" class="mk-code-verify__resend-link mk-focus-ring" data-mk-pin-resend-link
                  aria-label="Reenviar código de verificación">Reenviar código (00:59)</a>
              </p>
            </div>

            <div class="mk-btn-wrap mk-code-verify__btn-wrap">
              <button type="submit" class="btn mk-btn-primary mk-focus-ring" id="mkValidatePinBtn" data-mk-pin-submit
                disabled aria-disabled="true">
                Validar código
              </button>
            </div>

            <p class="mk-form-feedback mk-code-verify__feedback" data-mk-pin-feedback aria-live="polite">
            </p>
          </form>
        </div>

        <aside class="mk-onboarding__visual d-flex justify-content-center" aria-label="Ilustración de bienvenida">
          <img src="assets/img/mk-onboarding-illustration.png"
            alt="Ilustración tecnológica de un cubo brillante con elementos espaciales" width="686" height="915"
            decoding="async" fetchpriority="high" class="img-contend-onboarding"/>
        </aside>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js" defer></script>
</body>

</html>
