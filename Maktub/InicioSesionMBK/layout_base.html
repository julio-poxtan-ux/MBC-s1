<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Onboarding MBK | Layout Base Form</title>
    <meta
      name="description"
      content="Layout base del formulario de registro de Onboarding MBK para insertar snippets HTML en nuevas pantallas."
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="mk-page-shell mk-page-shell--register-snippet">
    <a class="mk-skip-link" href="#mk-main">Saltar al snippet del formulario</a>

    <main id="mk-main" class="mk-main" aria-labelledby="mk-register-title-snippet" data-mk-page="register-layout-base">
      <section class="mk-register container-fluid px-0">
        <div class="mk-register__wrapper mk-register__wrapper--snippet">
          <div class="mk-register__panel">
            <!-- Snippet de columna de formulario basado en Figma 556:797 -->
            <form class="mk-register__form" data-mk-register-form novalidate>
              <header class="mk-register__header d-flex flex-column gap-2">
                <h1 id="mk-register-title-snippet" class="mk-register__title">Crea tu cuenta</h1>
                <p class="mk-register__subtitle">Ingresa los siguientes datos para registrarte</p>
              </header>

              <div class="mk-register__fields">
                <div class="mk-register__name-grid">
                  <div class="mk-input">
                    <label class="mk-input__label" for="mkFirstNameBase">Nombre(s)</label>
                    <div class="mk-input__field">
                      <input
                        id="mkFirstNameBase"
                        class="form-control mk-input__control mk-focus-ring"
                        type="text"
                        name="firstName"
                        autocomplete="given-name"
                        placeholder="Nombre completo"
                        data-mk-field="firstName"
                        aria-describedby="mkErrorFirstNameBase"
                        required
                      />
                    </div>
                    <p
                      id="mkErrorFirstNameBase"
                      class="mk-input__hint mk-input__hint--full"
                      data-mk-error-for="firstName"
                      hidden
                    ></p>
                  </div>

                  <div class="mk-input">
                    <label class="mk-input__label" for="mkLastNameBase">Apellido(s)</label>
                    <div class="mk-input__field">
                      <input
                        id="mkLastNameBase"
                        class="form-control mk-input__control mk-focus-ring"
                        type="text"
                        name="lastName"
                        autocomplete="family-name"
                        placeholder="Apellido"
                        data-mk-field="lastName"
                        aria-describedby="mkErrorLastNameBase"
                        required
                      />
                    </div>
                    <p
                      id="mkErrorLastNameBase"
                      class="mk-input__hint mk-input__hint--full"
                      data-mk-error-for="lastName"
                      hidden
                    ></p>
                  </div>
                </div>

                <div class="mk-input">
                  <label class="mk-input__label" for="mkEmailBase">Correo electrónico</label>
                  <div class="mk-input__field">
                    <input
                      id="mkEmailBase"
                      class="form-control mk-input__control mk-focus-ring"
                      type="email"
                      name="email"
                      autocomplete="email"
                      placeholder="Ingresa tu correo electrónico"
                      data-mk-field="email"
                      aria-describedby="mkErrorEmailBase"
                      required
                    />
                  </div>
                  <p id="mkErrorEmailBase" class="mk-input__hint mk-input__hint--full" data-mk-error-for="email" hidden></p>
                </div>

                <div class="mk-register__password-group">
                  <div class="mk-input">
                    <label class="mk-input__label" for="mkPasswordBase">Contraseña</label>
                    <div class="mk-input__field">
                      <input
                        id="mkPasswordBase"
                        class="form-control mk-input__control mk-focus-ring"
                        type="password"
                        name="password"
                        autocomplete="new-password"
                        placeholder="Contraseña"
                        data-mk-field="password"
                        aria-describedby="mkErrorPasswordBase"
                        required
                      />
                      <button
                        class="mk-input__icon mk-focus-ring"
                        type="button"
                        data-mk-toggle="password"
                        data-target="mkPasswordBase"
                        aria-label="Mostrar contraseña"
                      >
                        <i class="bi bi-eye" aria-hidden="true"></i>
                      </button>
                    </div>
                    <p
                      id="mkErrorPasswordBase"
                      class="mk-input__hint mk-input__hint--full"
                      data-mk-error-for="password"
                      hidden
                    ></p>
                  </div>

                  <div class="mk-input">
                    <label class="mk-input__label" for="mkConfirmPasswordBase">Confirmar contraseña</label>
                    <div class="mk-input__field">
                      <input
                        id="mkConfirmPasswordBase"
                        class="form-control mk-input__control mk-input__control--prefilled mk-focus-ring"
                        type="text"
                        name="confirmPassword"
                        autocomplete="new-password"
                        value="!2I3!12@wddFasa%"
                        data-mk-field="confirmPassword"
                        aria-describedby="mkErrorConfirmPasswordBase"
                        required
                      />
                      <button
                        class="mk-input__icon mk-focus-ring"
                        type="button"
                        data-mk-toggle="password"
                        data-target="mkConfirmPasswordBase"
                        aria-label="Ocultar contraseña"
                      >
                        <i class="bi bi-eye-slash" aria-hidden="true"></i>
                      </button>
                    </div>
                    <p
                      id="mkErrorConfirmPasswordBase"
                      class="mk-input__hint mk-input__hint--full"
                      data-mk-error-for="confirmPassword"
                      hidden
                    ></p>
                  </div>
                </div>
              </div>

              <fieldset class="mk-register__consent border-0 p-0">
                <legend class="visually-hidden">Consentimiento legal</legend>
                <div class="form-check mk-form-check">
                  <input
                    class="form-check-input mk-check-input mk-check-input--register mk-focus-ring"
                    type="checkbox"
                    id="mkRegisterTermsBase"
                    data-mk-field="terms"
                    aria-describedby="mkRegisterFeedbackBase"
                  />
                  <label class="form-check-label mk-register__legal" for="mkRegisterTermsBase">
                    Al hacer click en “Registrarse”, he leído los
                    <a href="#" class="mk-focus-ring">Términos y Condiciones</a>
                    junto a las
                    <a href="#" class="mk-focus-ring">Políticas de Privacidad.</a>
                  </label>
                </div>
              </fieldset>

              <div class="mk-btn-wrap mk-register__btn-wrap">
                <button
                  type="submit"
                  class="btn mk-btn-primary mk-focus-ring"
                  id="mkRegisterBtn"
                  data-mk-register-submit
                  disabled
                  aria-disabled="true"
                >
                  Registrarme
                </button>
              </div>
              

              <p
                id="mkRegisterFeedbackBase"
                class="mk-form-feedback mk-register__feedback"
                aria-live="polite"
                data-mk-register-feedback
              ></p>
            </form>
            <!-- /Snippet de columna de formulario -->
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js" defer></script>
  </body>
</html>
