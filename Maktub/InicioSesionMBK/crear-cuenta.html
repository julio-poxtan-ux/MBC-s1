<!doctype html>
<html lang="es-MX">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Onboarding MBK | Crea tu cuenta</title>
  <meta name="description"
    content="Crea tu cuenta en Onboarding MBK ingresando tus datos personales, correo y contraseña segura." />
  <meta name="robots" content="index,follow" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Onboarding MBK | Crea tu cuenta" />
  <meta property="og:description" content="Completa el formulario de registro para comenzar en Maktub." />
  <meta property="og:locale" content="es_MX" />
  <meta name="theme-color" content="#0f2b42" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="mk-page-shell mk-page-shell--register">
  <a class="mk-skip-link" href="#mk-main">Saltar al formulario</a>

  <main id="mk-main" class="mk-main" aria-labelledby="mk-register-title" data-mk-page="create-account">
    <section class="mk-register container-fluid px-0">
      <div class="mk-register__wrapper d-flex flex-column flex-lg-row align-items-center justify-content-center">
        <div class="mk-register__panel">
          <form class="mk-register__form" data-mk-register-form novalidate>
            <header class="mk-register__header d-flex flex-column gap-2">
              <h1 id="mk-register-title" class="mk-register__title">Crea tu cuenta</h1>
              <p class="mk-register__subtitle">Ingresa los siguientes datos para registrarte</p>
            </header>

            <div class="mk-register__fields">
              <div class="mk-register__name-grid">
                <div class="mk-input">
                  <label class="mk-input__label" for="mkFirstName">Nombre(s)</label>
                  <div class="mk-input__field">
                    <input id="mkFirstName" class="form-control mk-input__control mk-focus-ring" type="text"
                      name="firstName" autocomplete="given-name" placeholder="Nombre completo" data-mk-field="firstName"
                      aria-describedby="mkErrorFirstName" required />
                  </div>
                  <p id="mkErrorFirstName" class="mk-input__hint mk-input__hint--full" data-mk-error-for="firstName"
                    hidden></p>
                </div>

                <div class="mk-input">
                  <label class="mk-input__label" for="mkLastName">Apellido(s)</label>
                  <div class="mk-input__field">
                    <input id="mkLastName" class="form-control mk-input__control mk-focus-ring" type="text"
                      name="lastName" autocomplete="family-name" placeholder="Apellido" data-mk-field="lastName"
                      aria-describedby="mkErrorLastName" required />
                  </div>
                  <p id="mkErrorLastName" class="mk-input__hint mk-input__hint--full" data-mk-error-for="lastName"
                    hidden></p>
                </div>
              </div>

              <div class="mk-input">
                <label class="mk-input__label" for="mkEmail">Correo electrónico</label>
                <div class="mk-input__field">
                  <input id="mkEmail" class="form-control mk-input__control mk-focus-ring" type="email" name="email"
                    autocomplete="email" placeholder="Ingresa tu correo electrónico" data-mk-field="email"
                    aria-describedby="mkErrorEmail" required />
                </div>
                <p id="mkErrorEmail" class="mk-input__hint mk-input__hint--full" data-mk-error-for="email" hidden></p>
              </div>

              <div class="mk-register__password-group">
                <div class="mk-input">
                  <label class="mk-input__label" for="mkPassword">Contraseña</label>
                  <div class="mk-input__field">
                    <input id="mkPassword" class="form-control mk-input__control mk-focus-ring" type="password"
                      name="password" autocomplete="new-password" placeholder="Contraseña" data-mk-field="password"
                      aria-describedby="mkErrorPassword" required />
                    <button class="mk-input__icon mk-focus-ring" type="button" data-mk-toggle="password"
                      data-target="mkPassword" aria-label="Mostrar contraseña">
                      <i class="bi bi-eye" aria-hidden="true"></i>
                    </button>
                  </div>
                  <p id="mkErrorPassword" class="mk-input__hint mk-input__hint--full" data-mk-error-for="password"
                    hidden></p>
                </div>

                <div class="mk-input">
                  <label class="mk-input__label" for="mkConfirmPassword">Confirmar contraseña</label>
                  <div class="mk-input__field">
                    <input id="mkConfirmPassword"
                      class="form-control mk-input__control mk-input__control--prefilled mk-focus-ring" type="text"
                      name="confirmPassword" autocomplete="new-password" value="!2I3!12@wddFasa%"
                      data-mk-field="confirmPassword" aria-describedby="mkErrorConfirmPassword" required />
                    <button class="mk-input__icon mk-focus-ring" type="button" data-mk-toggle="password"
                      data-target="mkConfirmPassword" aria-label="Ocultar contraseña">
                      <i class="bi bi-eye-slash" aria-hidden="true"></i>
                    </button>
                  </div>
                  <p id="mkErrorConfirmPassword" class="mk-input__hint mk-input__hint--full"
                    data-mk-error-for="confirmPassword" hidden></p>
                </div>
              </div>
            </div>

            <fieldset class="mk-register__consent border-0 p-0">
              <legend class="visually-hidden">Consentimiento legal</legend>
              <div class="form-check mk-form-check">
                <input class="form-check-input mk-check-input mk-check-input--register mk-focus-ring" type="checkbox"
                  id="mkRegisterTerms" data-mk-field="terms" aria-describedby="mkRegisterFeedback" />
                <label class="form-check-label mk-register__legal" for="mkRegisterTerms">
                  Al hacer click en “Registrarse”, he leído los
                  <a href="#" class="mk-focus-ring">Términos y Condiciones</a>
                  junto a las
                  <a href="#" class="mk-focus-ring">Políticas de Privacidad.</a>
                </label>
              </div>
            </fieldset>

            <div class="mk-btn-wrap mk-register__btn-wrap">
              <button type="submit" class="btn mk-btn-primary mk-focus-ring" id="mkRegisterBtn" data-mk-register-submit
                disabled aria-disabled="true">
                Registrarme
              </button>
            </div>

            <p id="mkRegisterFeedback" class="mk-form-feedback mk-register__feedback" aria-live="polite"
              data-mk-register-feedback></p>
          </form>
        </div>

        <aside class="mk-onboarding__visual d-flex justify-content-center" aria-label="Ilustración de bienvenida">
          <img src="assets/img/mk-onboarding-illustration.png"
            alt="Ilustración tecnológica de un cubo brillante con elementos espaciales" width="686" height="915"
            decoding="async" fetchpriority="high" class="img-contend-onboarding"/>
        </aside>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js" defer></script>
</body>

</html>
