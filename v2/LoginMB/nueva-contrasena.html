<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Definir nueva Contraseña | MB Capital</title>

  <!-- Bootstrap 5.3 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Roboto -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
  <!-- TWK Everett (local) -->
  <link rel="stylesheet" href="../Landings/assets/font/twk/stylesheet.css">
  <!-- Auth styles -->
  <link rel="stylesheet" href="css/auth.css">
</head>

<body>

<div class="auth-page">

  <!-- ══════════════════════════════════════
       BRAND PANEL — left on desktop, bottom on mobile
  ══════════════════════════════════════ -->
  <aside class="auth-brand" aria-hidden="true">
    <!-- Background: man in bright doorway -->
    <img
      class="auth-brand__bg"
      src="https://www.figma.com/api/mcp/asset/3bc694b1-a783-42e9-becd-974bb995fec1"
      alt=""
    >
    <!-- Gradient overlay -->
    <div class="auth-brand__gradient" style="background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.85) 75%);"></div>
    <!-- Decorative wave -->
    <img
      class="auth-brand__wave"
      src="https://www.figma.com/api/mcp/asset/f0bb64aa-cf45-41d8-aafd-ffec2268d121"
      alt=""
    >
    <!-- Brand content -->
    <div class="auth-brand__content">
      <img
        class="auth-brand__logo"
        src="https://www.figma.com/api/mcp/asset/b0872a43-0221-4f8f-b34a-520d4664bf86"
        alt="MB Capital"
      >
      <h2 class="auth-brand__title">Conecta con tu energía financiera</h2>
      <p class="auth-brand__subtitle">Da el primer paso de forma segura.</p>
    </div>
  </aside>

  <!-- ══════════════════════════════════════
       FORM PANEL — right on desktop, top on mobile
  ══════════════════════════════════════ -->
  <main class="auth-form-panel">
    <div class="auth-form-inner">

      <!-- Title -->
      <div class="mb-4 pb-1">
        <h1 class="auth-title">
          Definir nueva<br>Contraseña
        </h1>
      </div>

      <!-- Form -->
      <form id="newPasswordForm" novalidate>

        <!-- Nueva Contraseña -->
        <div class="mb-2">
          <label for="newPassword" class="auth-label">Nueva Contraseña</label>
          <div class="password-wrap">
            <input
              type="password"
              id="newPassword"
              name="newPassword"
              class="auth-input auth-input--pw"
              placeholder="Escribe tu contraseña"
              autocomplete="new-password"
              minlength="8"
              required
              aria-describedby="newPassword-error"
            >
            <button
              type="button"
              class="password-toggle"
              aria-label="Mostrar contraseña"
              data-target="newPassword"
            >
              <i class="bi bi-eye" aria-hidden="true"></i>
            </button>
          </div>
          <div id="newPassword-error" class="invalid-feedback" role="alert">
            La contraseña debe tener al menos 8 caracteres.
          </div>
          <!-- Strength bar -->
          <div class="pw-strength" aria-hidden="true">
            <div class="pw-strength__bar" id="strengthBar"></div>
          </div>
          <p class="pw-strength__label auth-muted" id="strengthLabel" aria-live="polite"></p>
        </div>

        <!-- Confirmar Contraseña -->
        <div class="mb-4">
          <label for="confirmPassword" class="auth-label">Confirmar Contraseña</label>
          <div class="password-wrap">
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              class="auth-input auth-input--pw"
              placeholder="Escribe tu contraseña"
              autocomplete="new-password"
              required
              aria-describedby="confirmPassword-error"
            >
            <button
              type="button"
              class="password-toggle"
              aria-label="Mostrar contraseña"
              data-target="confirmPassword"
            >
              <i class="bi bi-eye" aria-hidden="true"></i>
            </button>
          </div>
          <div id="confirmPassword-error" class="invalid-feedback" role="alert">
            Las contraseñas no coinciden.
          </div>
          <p class="match-hint" id="matchHint" aria-live="polite"></p>
        </div>

        <!-- Submit -->
        <div class="mb-3">
          <button type="submit" class="btn-mb btn-mb--full">
            Guardar cambios
          </button>
        </div>

        <!-- Helper text -->
        <p class="auth-helper mt-2">
          Una vez confirmes tu nueva contraseña, serás redirigido a
          Iniciar Sesión nuevamente.
        </p>

      </form>

    </div>
  </main>

</div><!-- /.auth-page -->

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
(function () {
  'use strict';

  const form            = document.getElementById('newPasswordForm');
  const newPw           = document.getElementById('newPassword');
  const confirmPw       = document.getElementById('confirmPassword');
  const strengthBar     = document.getElementById('strengthBar');
  const strengthLabel   = document.getElementById('strengthLabel');
  const matchHint       = document.getElementById('matchHint');

  /* ── Password strength ── */
  const STRENGTH = [
    { min: 0,  label: '',            color: '',          pct: 0   },
    { min: 1,  label: 'Muy débil',   color: '#f87171',   pct: 20  },
    { min: 6,  label: 'Débil',       color: '#fb923c',   pct: 40  },
    { min: 8,  label: 'Aceptable',   color: '#facc15',   pct: 60  },
    { min: 10, label: 'Fuerte',      color: '#4ade80',   pct: 80  },
    { min: 14, label: 'Muy fuerte',  color: '#22c55e',   pct: 100 },
  ];

  function calcStrength(value) {
    let score = 0;
    if (value.length >= 8)                     score++;
    if (value.length >= 12)                    score++;
    if (/[A-Z]/.test(value))                   score++;
    if (/[0-9]/.test(value))                   score++;
    if (/[^A-Za-z0-9]/.test(value))            score++;
    const len = value.length;
    /* Pick tier */
    for (let i = STRENGTH.length - 1; i >= 0; i--) {
      if (len >= STRENGTH[i].min) return STRENGTH[i];
    }
    return STRENGTH[0];
  }

  newPw.addEventListener('input', function () {
    const tier = calcStrength(newPw.value);
    strengthBar.style.width      = tier.pct + '%';
    strengthBar.style.background = tier.color;
    strengthLabel.textContent    = tier.label;
    strengthLabel.style.color    = tier.color;
    /* Revalidate confirm if already touched */
    if (confirmPw.value) validateConfirm();
    if (newPw.classList.contains('is-invalid')) validateNew();
  });

  /* ── Validate new password ── */
  function validateNew() {
    if (newPw.checkValidity()) {
      newPw.classList.remove('is-invalid');
      newPw.classList.add('is-valid');
      return true;
    }
    newPw.classList.remove('is-valid');
    newPw.classList.add('is-invalid');
    return false;
  }

  /* ── Validate confirm password ── */
  function validateConfirm() {
    const match = confirmPw.value === newPw.value && confirmPw.value !== '';
    const filled = confirmPw.value !== '';

    /* Reset custom validity */
    confirmPw.setCustomValidity(
      !filled        ? 'Este campo es requerido.' :
      !match         ? 'Las contraseñas no coinciden.' : ''
    );

    if (!filled) {
      confirmPw.classList.remove('is-valid', 'is-invalid');
      matchHint.textContent = '';
      return false;
    }

    if (match) {
      confirmPw.classList.remove('is-invalid');
      confirmPw.classList.add('is-valid');
      matchHint.innerHTML = '<span style="color:#4ade80"><i class="bi bi-check-circle-fill"></i> Las contraseñas coinciden</span>';
      return true;
    } else {
      confirmPw.classList.remove('is-valid');
      confirmPw.classList.add('is-invalid');
      matchHint.innerHTML = '<span style="color:#f87171"><i class="bi bi-x-circle-fill"></i> Las contraseñas no coinciden</span>';
      return false;
    }
  }

  /* Live validation */
  newPw.addEventListener('blur',  validateNew);
  confirmPw.addEventListener('blur',  validateConfirm);
  confirmPw.addEventListener('input', validateConfirm);

  /* ── Submit ── */
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    const okNew     = validateNew();
    const okConfirm = validateConfirm();

    if (okNew && okConfirm) {
      /* TODO: llamar API para guardar la nueva contraseña */
      console.log('[nueva-contrasena] Contraseña guardada. Redirigiendo a login...');
      window.location.href = 'login.html';
    } else {
      const first = form.querySelector('.is-invalid');
      if (first) first.focus();
    }
  });

  /* ── Toggle mostrar / ocultar contraseña ── */
  document.querySelectorAll('.password-toggle').forEach(function (btn) {
    btn.addEventListener('click', function () {
      const target = document.getElementById(btn.dataset.target);
      const icon   = btn.querySelector('i');
      const isHidden = target.type === 'password';
      target.type    = isHidden ? 'text'    : 'password';
      icon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
      btn.setAttribute('aria-label', isHidden ? 'Ocultar contraseña' : 'Mostrar contraseña');
    });
  });
}());
</script>

</body>
</html>
