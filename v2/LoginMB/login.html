<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión | MB Capital</title>

  <!-- Bootstrap 5.3 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <!-- Roboto -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
  <!-- TWK Everett (local) -->
  <link rel="stylesheet" href="../Landings/assets/font/twk/stylesheet.css">
  <!-- Auth styles -->
  <link rel="stylesheet" href="css/auth.css">
</head>

<body>

<div class="auth-page">

  <!-- ══════════════════════════════════════
       BRAND PANEL — left on desktop, bottom on mobile
  ══════════════════════════════════════ -->
  <aside class="auth-brand" aria-hidden="true">
    <!-- Background -->
    <img
      class="auth-brand__bg"
      src="bg-login1.jpg"
      alt=""
    >
    <!-- Gradient overlay -->
    <div class="auth-brand__gradient"></div>
    <!-- Decorative wave -->
    <img
      class="auth-brand__wave"
      src="https://www.figma.com/api/mcp/asset/154fef48-ea73-4b05-ba5c-65b0842c0ad3"
      alt=""
    >
    <!-- Brand content -->
    <div class="auth-brand__content">
      <img
        class="auth-brand__logo"
        src="https://www.figma.com/api/mcp/asset/4517ff2f-3df2-4fe4-b65f-b3a0eb71b4e3"
        alt="MB Capital"
      >
      <h2 class="auth-brand__title">Conecta con tu energía financiera</h2>
      <p class="auth-brand__subtitle">Da el primer paso de forma segura.</p>
    </div>
  </aside>

  <!-- ══════════════════════════════════════
       FORM PANEL — right on desktop, top on mobile
  ══════════════════════════════════════ -->
  <main class="auth-form-panel">
    <div class="auth-form-inner">

      <!-- Title -->
      <div class="mb-4 pb-1">
        <h1 class="auth-title">Inicia Sesión</h1>
        <p class="auth-link-row mt-1">
          ¿No tienes cuenta?&nbsp;
          <a href="#">Contáctanos</a>
        </p>
      </div>

      <!-- Form -->
      <form id="loginForm" novalidate>

        <!-- MIU / Email -->
        <div class="mb-4">
          <label for="miu" class="auth-label">MIU o Dirección de Correo</label>
          <input
            type="text"
            id="miu"
            name="miu"
            class="auth-input"
            placeholder="MIU: 0000 / correo@gmail.com"
            autocomplete="username"
            required
            aria-describedby="miu-error"
          >
          <div id="miu-error" class="invalid-feedback" role="alert">
            Este campo es requerido.
          </div>
        </div>

        <!-- Contraseña -->
        <div class="mb-4">
          <label for="password" class="auth-label">Contraseña</label>
          <div class="password-wrap">
            <input
              type="password"
              id="password"
              name="password"
              class="auth-input auth-input--pw"
              placeholder="Escribe tu contraseña"
              autocomplete="current-password"
              minlength="6"
              required
              aria-describedby="password-error"
            >
            <button
              type="button"
              class="password-toggle"
              aria-label="Mostrar contraseña"
              data-target="password"
            >
              <i class="bi bi-eye" aria-hidden="true"></i>
            </button>
          </div>
          <div id="password-error" class="invalid-feedback" role="alert">
            Ingresa tu contraseña (mínimo 6 caracteres).
          </div>
        </div>

        <!-- Actions -->
        <div class="d-flex align-items-center gap-3 flex-wrap">
          <a href="forgot-password.html" class="auth-muted">
            ¿Olvidaste tu contraseña?
          </a>
          <button type="submit" class="btn-mb ms-auto">
            Iniciar Sesión
          </button>
        </div>

      </form>
    </div>
  </main>

</div><!-- /.auth-page -->

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
(function () {
  'use strict';

  const form    = document.getElementById('loginForm');
  const inputs  = form.querySelectorAll('.auth-input[required]');

  /* ── Validate a single input ── */
  function validate(input) {
    if (input.checkValidity()) {
      input.classList.remove('is-invalid');
      input.classList.add('is-valid');
      return true;
    } else {
      input.classList.remove('is-valid');
      input.classList.add('is-invalid');
      return false;
    }
  }

  /* ── Live validation on blur / input ── */
  inputs.forEach(function (input) {
    input.addEventListener('blur',  function () { validate(input); });
    input.addEventListener('input', function () {
      if (input.classList.contains('is-invalid')) validate(input);
    });
  });

  /* ── Submit ── */
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    let ok = true;
    inputs.forEach(function (input) {
      if (!validate(input)) ok = false;
    });
    if (ok) {
      /* TODO: conectar con el backend */
      console.log('[login] Formulario válido — enviando...');
    } else {
      /* Enfocar el primer campo inválido */
      const first = form.querySelector('.is-invalid');
      if (first) first.focus();
    }
  });

  /* ── Toggle mostrar / ocultar contraseña ── */
  document.querySelectorAll('.password-toggle').forEach(function (btn) {
    btn.addEventListener('click', function () {
      const target = document.getElementById(btn.dataset.target);
      const icon   = btn.querySelector('i');
      const isHidden = target.type === 'password';
      target.type          = isHidden ? 'text'    : 'password';
      icon.className       = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
      btn.setAttribute('aria-label', isHidden ? 'Ocultar contraseña' : 'Mostrar contraseña');
    });
  });
}());
</script>

</body>
</html>
