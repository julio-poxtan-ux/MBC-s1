# apphosting.yaml — Configuración de Firebase App Hosting
# Documentación: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  runtime: nodejs20
  cpu: 1
  memoryMiB: 512
  concurrency: 80
  minInstances: 0   # escala a cero cuando no hay tráfico (plan gratis)
  maxInstances: 3

env:
  # ── Modo de ejecución ──────────────────────────────────────────────────
  - variable: NODE_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME

  # ── Cloud SQL ──────────────────────────────────────────────────────────
  # Reemplazá con tu Connection Name real (proyecto:region:instancia)
  - variable: CLOUD_SQL_CONNECTION_NAME
    value: "REEMPLAZAR:us-central1:bitacora-db"
    availability:
      - RUNTIME

  - variable: DB_NAME
    value: bitacora
    availability:
      - RUNTIME

  # Secrets: los valores sensibles viven en Google Secret Manager.
  # Creálos con: gcloud secrets create db-user --data-file=-
  - variable: DB_USER
    secret: db-user
    availability:
      - RUNTIME

  - variable: DB_PASSWORD
    secret: db-password
    availability:
      - RUNTIME

  # ── CORS ───────────────────────────────────────────────────────────────
  # Reemplazá con la URL real de tu frontend en Firebase Hosting
  - variable: FRONTEND_ORIGIN
    value: "https://REEMPLAZAR.web.app"
    availability:
      - RUNTIME
